syntax = "proto3";

option csharp_namespace = "Axis.WorkflowBuilder.Contracts.Grpc";

package axis.workflowbuilder.v1;

// Cross-module sync RPC (ADR-014). Used by FormBuilder to block form deletion.
service WorkflowFormReferenceService {
  rpc CountBlockingFormReferences(CountBlockingFormReferencesRequest)
      returns (CountBlockingFormReferencesResponse);
}

message CountBlockingFormReferencesRequest {
  string form_id = 1;
  string organization_id = 2;
}

message CountBlockingFormReferencesResponse {
  int32 blocking_reference_count = 1;
}
