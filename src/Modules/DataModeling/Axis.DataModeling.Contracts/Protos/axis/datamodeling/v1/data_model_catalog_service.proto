syntax = "proto3";

package axis.datamodeling.v1;

option csharp_namespace = "Axis.DataModeling.Contracts.Grpc";

// Cross-module sync RPC (ADR-014). Used by other modules to look up data model summaries.
// Tenant scoping: server derives tenant_id from the caller's JWT `tenant_id` claim;
// callers MUST forward the inbound `authorization` header on every call.
service DataModelCatalogService {
  rpc GetModelSummary(GetModelSummaryRequest) returns (GetModelSummaryResponse);
}

message GetModelSummaryRequest {
  string model_id = 1;
}

// When `exists` is false, `model_name` is unset (empty string).
// Consumers MUST check `exists` before reading `model_name`.
message GetModelSummaryResponse {
  bool exists = 1;
  string model_name = 2;
}
