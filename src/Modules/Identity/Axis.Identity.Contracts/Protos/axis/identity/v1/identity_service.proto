syntax = "proto3";

option csharp_namespace = "Axis.Identity.Contracts.Grpc";

package axis.identity.v1;

// Cross-module sync RPC (ADR-014). Escape hatch when JWT claims / local read models are insufficient.
// Tenant scoping: server derives team_account_id from the caller's JWT `team_account_id` claim;
// callers MUST forward the inbound `authorization` header on every call.
service IdentityService {
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
}

message GetUserPermissionsRequest {
  reserved 2;
  reserved "team_account_id";

  string user_id = 1;
}

message GetUserPermissionsResponse {
  repeated string permissions = 1;
}
