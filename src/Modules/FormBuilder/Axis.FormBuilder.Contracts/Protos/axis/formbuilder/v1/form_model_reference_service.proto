syntax = "proto3";

option csharp_namespace = "Axis.FormBuilder.Contracts.Grpc";

package axis.formbuilder.v1;

// Cross-module sync RPC (ADR-014). Used by DataModeling to block model deletion.
// Workspace scoping: server derives workspace_id from the caller's JWT `workspace_id` claim;
// callers MUST forward the inbound `authorization` header on every call.
service FormModelReferenceService {
  rpc CountActiveModelReferences(CountActiveModelReferencesRequest)
      returns (CountActiveModelReferencesResponse);
}

message CountActiveModelReferencesRequest {
  reserved 2;
  reserved "organization_id", "tenant_id";

  string model_id = 1;
}

message CountActiveModelReferencesResponse {
  int32 active_reference_count = 1;
}
