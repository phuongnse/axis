# Buf v2 — one module per Axis.{Module}.Contracts/Protos root.
# Layout: Protos/axis/{module}/v{n}/*.proto with `package axis.{module}.v{n};`
# Codegen stays on Grpc.Tools in each Contracts csproj; Buf enforces lint + breaking.
#
# When adding a module with .proto files: register its Protos path below and run
# ./scripts/check-buf-modules.sh (also enforced in CI doc drift when protos change).
version: v2
modules:
  - path: src/Modules/Identity/Axis.Identity.Contracts/Protos
  - path: src/Modules/DataModeling/Axis.DataModeling.Contracts/Protos
  - path: src/Modules/FormBuilder/Axis.FormBuilder.Contracts/Protos
  - path: src/Modules/WorkflowBuilder/Axis.WorkflowBuilder.Contracts/Protos
lint:
  use:
    - STANDARD
  except:
    # RPC request/response types follow {Rpc}Request / {Rpc}Response in .proto files.
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  # PACKAGE allows field deletion when the field number + name are reserved.
  # FILE would forbid deletion outright; we want the reserved-number escape
  # hatch because pre-MVP refactors (e.g. tenant-scoping moved into JWT) do
  # remove fields with no external consumers yet.
  use:
    - PACKAGE
