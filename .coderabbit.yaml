# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit config for Axis. Purpose: make automated review cite this repo's
# canonical rules (CLAUDE.md + docs/playbooks) instead of generic advice.
# Every finding should map to a section a human or agent can act on. The
# enforcement taxonomy lives in docs/REVIEW_FINDINGS.md.
#
# Deterministic rules like no-var locals and CancellationToken forwarding are
# enforced by analyzers/.editorconfig and should fail the build, not wait for
# review. The instructions below are for judgment-based classes or guidance.
language: en-US

reviews:
  # Keep the prose review focused on real issues, not nitpicks the analyzers
  # and dotnet format already own.
  profile: chill
  poem: false
  path_instructions:
    - path: "**/*.cs"
      instructions: |
        Project rules: CLAUDE.md (machine rules P0-P2), .editorconfig, and
        docs/REVIEW_FINDINGS.md are authoritative. No `var` for locals and
        CancellationToken forwarding (CA2016) are analyzer-enforced and fail
        the build; only flag them if the build somehow did not. Inline
        fully-qualified type names are style guidance, not a hard gate.
        One-public-type-per-file is deliberately NOT enforced because it
        conflicts with intentional groupings; see docs/REVIEW_FINDINGS.md.
        Do not flag it.
        Focus review on:
        - Result / Result<T> for business failures; exceptions only for
          infrastructure faults (CLAUDE.md P1). Flag bespoke bool/tuple/throw
          patterns where a Result belongs.
        - Side effects (external storage, messaging) must not commit before the
          DB transaction they depend on — flag ordering that can leave drift.
    - path: "src/Modules/**/*.cs"
      instructions: |
        Service boundaries are P0 (CLAUDE.md "Service boundaries"). Flag, citing
        the rule:
        - Any in-process call into another module's Application/Infrastructure
          (including services.GetRequiredService<IFooFromAnotherModule>()).
        - Any project reference from Axis.{ModuleA}.* to Axis.{ModuleB}.* other
          than Axis.{ModuleB}.Contracts.
        - Shared DbContext, cross-module SQL, or cross-module aggregate refs.
        - MediatR used for cross-module dispatch (it is intra-module only;
          cross-module goes through Wolverine — Kafka for *Event/*Snapshot,
          RabbitMQ for *Command/*Job/*SagaStep, per ADR-025).
    - path: "src/**/Infrastructure/**/*.cs"
      instructions: |
        Per docs/playbooks/patterns.md: repositories return materialized types,
        not IQueryable; SaveChangesAsync lives only in IUnitOfWork; schema
        changes are EF Core migrations (EnsureCreated is forbidden everywhere,
        incl. tests — ADR-023). List queries project with .Select() before
        materializing — flag full-aggregate loads on list paths.
    - path: "src/Axis.Api/Endpoints/**/*.cs"
      instructions: |
        Minimal API endpoints contain no logic: mediator.Send + ToProblemDetails
        only. Every endpoint has .RequireAuthorization() unless explicitly public
        (CLAUDE.md P1). Status codes must match the failure: malformed/invalid
        input is 400, not 500. Auth/permission checks run before input
        validation work, not after.
    - path: "**/*.proto"
      instructions: |
        New cross-module sync RPC requires a versioned .proto in
        Axis.{Module}.Contracts first (CLAUDE.md P1). Flag breaking changes to
        existing messages/services that lack a new field number or version.
    - path: "frontend/**/*.{ts,tsx}"
      instructions: |
        Per docs/playbooks/frontend.md: TanStack Query for server state, Zustand
        for client-only state; every fetch handles loading/empty/error; forms use
        React Hook Form + Zod; no tokens in localStorage; strict TS, no `any`; no
        cross-feature imports except via index.ts. Wire-shape types come from the
        generated src/lib/api-types.ts (OpenAPI) — flag any hand-written DTO that
        re-declares a server contract or its casing instead of importing it.
    - path: "{tests/**/*.cs,**/*Tests.cs}"
      instructions: |
        Per docs/playbooks/testing.md: integration tests use Testcontainers, not
        in-memory EF; names follow {Subject}_{Condition}_{ExpectedOutcome}.
        Test-honesty check (high priority): the assertions must prove what the
        test name claims. If a test named ..._Returns403 asserts a 401 (or any
        status/outcome that contradicts its name), flag it — a green test that
        asserts the wrong thing is worse than a missing one.
    - path: "**/*.md"
      instructions: |
        Docs follow docs/playbooks/docs-style.md (§ Prose style, § Single owner,
        § Keep practice docs general). Flag: verbose prose (filler, restatement,
        paragraphs where a table/list fits), a fact duplicated instead of linking
        its single owner, and over-detailed code snippets tied to one feature
        (docs show the generic shape — placeholders over real names/fields).
        Real rot only, not nitpicks.
