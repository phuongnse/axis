version: 2

# Dependabot opens PRs on a monthly schedule. Minor + patch bumps are grouped into
# one PR per ecosystem (NuGet, npm, GitHub Actions). Security advisories still
# open immediately. All semver-major updates are ignored — upgrade majors in a
# deliberate chore PR when ready (API breaks require code changes, not auto-merge).
updates:
  # .NET — central package management (Directory.Packages.props).
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"

  # Frontend npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"

  # GitHub Actions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"
