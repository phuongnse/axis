version: 2

# Dependabot opens a PR per ecosystem when an update is available, grouping
# minor + patch bumps to reduce noise. Security advisories always open a PR
# immediately, ignoring the schedule. Action SHAs are rewritten by Dependabot
# (`@v2` -> `@<sha> # v2.4.1`) so manual SHA hunting is unnecessary.
updates:
  # .NET — central package management (Directory.Packages.props) means
  # NuGet bumps land in one file regardless of which csproj uses them.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
      - dotnet
    groups:
      # Each named group restricts to minor + patch so major bumps land as
      # individual review-required PRs. Without this restriction, a tool
      # ecosystem (e.g. WolverineFx 5 → 6) would land grouped with patch
      # updates and slip past code review.
      dotnet-minor-and-patch:
        update-types: [minor, patch]
      microsoft-extensions:
        update-types: [minor, patch]
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.EntityFrameworkCore*"
          - "Microsoft.AspNetCore.*"
      wolverine:
        update-types: [minor, patch]
        patterns:
          - "WolverineFx*"
      openiddict:
        update-types: [minor, patch]
        patterns:
          - "OpenIddict*"
      serilog:
        update-types: [minor, patch]
        patterns:
          - "Serilog*"
      testing:
        update-types: [minor, patch]
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "NSubstitute*"
          - "Testcontainers*"
          - "Bogus"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "Microsoft.AspNetCore.Mvc.Testing"

  # Frontend npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
      - frontend
    groups:
      # See NuGet section above — each named group restricts to
      # minor + patch so majors require individual review (Vite 6 → 8
      # would break `@vitejs/plugin-react@5` and trigger nested-vite
      # install via Vitest 4, both of which are documented gotchas in
      # docs/TECH_STACK.md).
      frontend-minor-and-patch:
        update-types: [minor, patch]
      tanstack:
        update-types: [minor, patch]
        patterns:
          - "@tanstack/*"
      react:
        update-types: [minor, patch]
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        update-types: [minor, patch]
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      biome:
        update-types: [minor, patch]
        patterns:
          - "@biomejs/*"

  # GitHub Actions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
