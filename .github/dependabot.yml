version: 2

# Dependabot opens PRs on a monthly schedule. Minor + patch bumps are grouped into
# one PR per ecosystem (NuGet, npm, GitHub Actions). Security advisories still
# open immediately. Semver-major version updates are ignored for selected
# packages — bump those in a deliberate chore PR when ready.
updates:
  # .NET — central package management (Directory.Packages.props).
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    ignore:
      # Major bumps need explicit review (license, API, test tooling). Open a
      # manual chore PR when upgrading; do not rely on the monthly group PR.
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]
      - dependency-name: "coverlet.collector"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"

  # Frontend npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    ignore:
      # @types/node must track the Node runtime (frontend/.nvmrc).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"

  # GitHub Actions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
        patterns:
          - "*"
