name: CI Build and Test

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter calls pulls.listFiles to detect changed paths

jobs:
  # Detects which scopes the PR actually touches so the heavy jobs below
  # can skip themselves on PRs that don't affect them. Job-level `if:`
  # evaluating to false causes the job to report "Skipped", which counts
  # as Successful for required-check branch protection (GitHub behaviour
  # since 2022). Workflow-level `paths:` filters would silently never
  # report at all and break required-check enforcement — that's why the
  # filter lives here instead.
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      doc-drift-scope: ${{ steps.filter.outputs['doc-drift-scope'] }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Every filter includes the workflow itself so CI changes are
          # always validated against every job.
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'Directory.Packages.props'
              - 'Directory.Build.props'
              - 'Axis.sln'
              - '.editorconfig'
              - 'global.json'
              - '.github/workflows/build-and-test.yml'
            frontend:
              - 'frontend/**'
              - '.editorconfig'
              - '.github/workflows/build-and-test.yml'
            doc-drift-scope:
              - 'src/**'
              - 'tests/**'
              - 'docs/epics/**'
              - 'docs/PROGRESS.md'
              - 'scripts/check-doc-drift.sh'
              - '.github/workflows/build-and-test.yml'
            markdown:
              - '**/*.md'
              - 'lychee.toml'
              - '.github/workflows/build-and-test.yml'

  dotnet:
    name: .NET — Build and Test
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-dotnet's built-in cache hashes every csproj + packages.lock.json
      # (when present) and restores ~/.nuget/packages keyed on the hash.
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Verify Docker is available (required by Testcontainers)
        run: docker info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # Format gate — see CLAUDE.md § Gate 1. Runs after build so analyzer
      # diagnostics are populated. Fails the job on any whitespace / charset
      # / style violation the local `dotnet format` would also catch.
      - name: Verify formatting (dotnet format)
        run: dotnet format Axis.sln --verify-no-changes --no-restore

      - name: Test
        run: >
          dotnet test --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      # Upload TRX even on failure so PR annotations + post-mortem work.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx
          retention-days: 14

  frontend:
    name: Frontend — Type Check, Lint, and Test
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and lint (zero errors, zero warnings)
        run: npm run ci

      - name: Test
        run: npm run test

  doc-drift:
    name: Doc drift
    needs: detect
    if: needs.detect.outputs['doc-drift-scope'] == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check doc drift
        run: ./scripts/check-doc-drift.sh
        env:
          BASE_BRANCH: main

  link-check:
    name: Markdown link check
    needs: detect
    if: needs.detect.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Lychee runs in offline mode (configured in lychee.toml): resolves
      # local file paths and #anchors only. External http(s) is intentionally
      # not blocking — third-party rot is real but doesn't belong in PR CI.
      - name: Lychee — verify internal links and anchors
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config ./lychee.toml './**/*.md'
          fail: true

  # ──────────────────────────────────────────────────────────────────────
  # GHAS-only checks — disabled until GitHub Advanced Security is provisioned
  # ──────────────────────────────────────────────────────────────────────
  # `actions/dependency-review-action` and CodeQL code-scanning both require
  # GitHub Advanced Security for private repositories. CodeQL ran end-to-end
  # on PR #60 (171 queries, no findings) but failed at upload with
  #   "Code Security must be enabled for this repository to use code scanning"
  # and dependency-review failed at start with the same root cause. Once
  # GHAS is enabled, re-add:
  #
  #   dependency-review:
  #     name: Dependency review
  #     needs: detect
  #     if: needs.detect.outputs.backend == 'true' || needs.detect.outputs.frontend == 'true'
  #     runs-on: ubuntu-latest
  #     timeout-minutes: 5
  #     steps:
  #       - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #         with:
  #           persist-credentials: false
  #       - uses: actions/dependency-review-action@67d4f4bd7a9b17a0db54d2a7519187c65e339de8 # v4.8.0
  #         with:
  #           fail-on-severity: high
  #           comment-summary-in-pr: on-failure
  #
  # CodeQL: restore `.github/workflows/codeql.yml` from this commit's parent
  # (or its git history). The workflow analyzed cleanly — only the upload
  # step needs GHAS.
  #
  # In the meantime, Dependabot (.github/dependabot.yml) opens PRs for new
  # advisories against existing dependencies, covering the same threat
  # model with a publish-time delay.
