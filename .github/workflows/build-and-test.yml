name: CI Build and Test

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter calls pulls.listFiles to detect changed paths
  checks: write         # dorny/test-reporter posts test results as PR check annotations

jobs:
  # Detects which scopes the PR actually touches so the heavy jobs below
  # can skip themselves on PRs that don't affect them. Job-level `if:`
  # evaluating to false causes the job to report "Skipped", which counts
  # as Successful for required-check branch protection (GitHub behaviour
  # since 2022). Workflow-level `paths:` filters would silently never
  # report at all and break required-check enforcement — that's why the
  # filter lives here instead.
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      doc-drift-scope: ${{ steps.filter.outputs['doc-drift-scope'] }}
      protobuf: ${{ steps.filter.outputs.protobuf }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Every filter includes the workflow itself so CI changes are
          # always validated against every job.
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'Directory.Packages.props'
              - 'Directory.Build.props'
              - 'Axis.sln'
              - '.editorconfig'
              - 'global.json'
              - '.github/workflows/build-and-test.yml'
            frontend:
              - 'frontend/**'
              - '.editorconfig'
              - '.github/workflows/build-and-test.yml'
            doc-drift-scope:
              - 'src/**'
              - 'tests/**'
              - 'docs/epics/**'
              - 'docs/PROGRESS.md'
              - 'scripts/check-doc-drift.sh'
              - 'scripts/check-local-dev-docs.py'
              - 'scripts/check-buf-modules.sh'
              - 'buf.yaml'
              - '.github/workflows/build-and-test.yml'
            protobuf:
              - '**/*.proto'
              - 'buf.yaml'
              - 'scripts/check-buf-modules.sh'
              - '.github/workflows/build-and-test.yml'
            markdown:
              - '**/*.md'
              - 'lychee.toml'
              - '.github/workflows/build-and-test.yml'

  dotnet:
    name: .NET — Build and Test
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-dotnet's built-in cache hashes every csproj + packages.lock.json
      # (when present) and restores ~/.nuget/packages keyed on the hash.
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Verify Docker is available (required by Testcontainers)
        run: docker info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # Format gate — see CLAUDE.md § Gate 1. Runs after build so analyzer
      # diagnostics are populated. Fails the job on any whitespace / charset
      # / style violation the local `dotnet format` would also catch.
      - name: Verify formatting (dotnet format)
        run: dotnet format Axis.sln --verify-no-changes --no-restore

      - name: Test
        run: >
          dotnet test --no-build --verbosity minimal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      # Upload TRX even on failure so post-mortem and local re-runs work.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx
          retention-days: 14

      # Annotate the PR with per-test pass/fail inline — makes failures visible
      # without downloading the TRX artifact. Runs even on test failure.
      - name: Annotate PR with test results (dorny/test-reporter)
        if: always()
        uses: dorny/test-reporter@dc3021de87dfb03b2f1c1e6ef1e074fc867b3a9c # v2.1.1
        with:
          name: .NET Test Results
          path: ${{ github.workspace }}/TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  frontend:
    name: Frontend — Type Check, Lint, and Test
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Single source of truth in frontend/.nvmrc — keeps Dockerfile.dev,
          # CI runner, and contributor local environments aligned.
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and lint (zero errors, zero warnings)
        run: npm run ci

      - name: Test
        run: npm run test

  doc-drift:
    name: Doc drift
    needs: detect
    if: needs.detect.outputs['doc-drift-scope'] == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check doc drift
        run: ./scripts/check-doc-drift.sh
        env:
          BASE_BRANCH: main

  protobuf:
    name: Protobuf — Buf lint and breaking
    needs: detect
    if: needs.detect.outputs.protobuf == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Buf CLI
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.50.0"
          github_token: ${{ github.token }}

      - name: buf lint
        run: buf lint

      # Do not git fetch here: checkout@v6 with fetch-depth: 0 already provides
      # origin/<base> for pull_request events. persist-credentials: false blocks fetch.
      - name: buf breaking (vs base branch)
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
        run: ./scripts/buf-breaking-against-base.sh

  link-check:
    name: Markdown link check
    needs: detect
    if: needs.detect.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Lychee runs in offline mode (configured in lychee.toml): resolves
      # local file paths and #anchors only. External http(s) is intentionally
      # not blocking — third-party rot is real but doesn't belong in PR CI.
      - name: Lychee — verify internal links and anchors
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config ./lychee.toml './**/*.md'
          fail: true

  # Secret scanning via TruffleHog. Free, open-source, no license required
  # for any account type (gitleaks-action v2 broke this — its breaking
  # update added a paid GITLEAKS_LICENSE requirement for org and personal
  # accounts alike, see https://github.com/gitleaks/gitleaks-action#-announcement).
  #
  # `--only-verified` cuts down false positives by querying the alleged
  # service for token validity before reporting. Scans the full diff
  # between PR base and HEAD (fetch-depth: 0 needed for that comparison).
  # NOTE: keep the job `name:` tool-agnostic ("Secret scanning"). The
  # required-check setting in branch protection references this exact
  # string — if we ever swap TruffleHog for another scanner (as we just
  # did Gitleaks → TruffleHog), changing the name would silently disable
  # the requirement until the protection rule is updated. The tool name
  # belongs in the step `name:` and surrounding comments.
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

