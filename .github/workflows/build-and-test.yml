name: CI Build and Test

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter calls pulls.listFiles to detect changed paths

jobs:
  pr:
    name: PR guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate PR metadata
        run: python scripts/axis.py check pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

  # Detects which scopes the PR actually touches so the heavy jobs below
  # can skip themselves on PRs that don't affect them. Job-level `if:`
  # evaluating to false causes the job to report "Skipped", which counts
  # as Successful for required-check branch protection (GitHub behaviour
  # since 2022). Workflow-level `paths:` filters would silently never
  # report at all and break required-check enforcement — that's why the
  # filter lives here instead.
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Every filter includes the workflow itself so CI changes are
          # always validated against every job.
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'Directory.Packages.props'
              - 'Directory.Build.props'
              - 'Axis.sln'
              - '.editorconfig'
              - 'global.json'
              # OpenApiDocumentTests generates the current document and diffs it
              # against the committed copy — a hand-edit that drifts from the
              # code must trigger the .NET job to be caught.
              - 'openapi.json'
              - '.github/workflows/build-and-test.yml'
            frontend:
              - 'frontend/**'
              - '.editorconfig'
              # api-types.ts is generated from openapi.json; any change to the
              # contract must run the "API types in sync" guard below, even
              # when no frontend/** file is touched in the same PR.
              - 'openapi.json'
              - '.github/workflows/build-and-test.yml'
            markdown:
              - '**/*.md'
              - 'lychee.toml'
              - '.github/workflows/build-and-test.yml'

  dotnet:
    name: .NET — Build and Test
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-dotnet's built-in cache hashes every csproj + packages.lock.json
      # (when present) and restores ~/.nuget/packages keyed on the hash.
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # Version owner: docs/TECH_STACK.md (.NET 8.x); global.json selects it.
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Verify Docker is available (required by Testcontainers)
        run: python scripts/axis.py check docker

      - name: Restore dependencies
        run: python scripts/axis.py dotnet restore

      - name: Vulnerable packages
        run: python scripts/axis.py check vulnerable-packages

      - name: Test project classification
        run: python scripts/axis.py check test-project-classification

      - name: Test naming convention
        run: python scripts/axis.py check test-naming

      - name: Build
        run: python scripts/axis.py dotnet build -- --no-restore

      # Format gate — see docs/playbooks/agent-checklist.md § Verification Gate.
      # Runs after build so analyzer diagnostics are populated. Fails the job on
      # any whitespace / charset / style violation the local Axis format wrapper
      # would also catch.
      - name: Verify formatting (dotnet format)
        run: python scripts/axis.py dotnet format --check

      - name: Test
        run: >
          python scripts/axis.py dotnet test -- --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/TestResults
          --collect:"XPlat Code Coverage"
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      # Upload TRX even on failure so PR annotations + post-mortem work.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-coverage
          path: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          retention-days: 14

  frontend:
    name: Frontend — Type Check, Lint, and Test
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Single source of truth in frontend/.nvmrc — keeps Dockerfile.dev,
          # CI runner, and contributor local environments aligned.
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: python scripts/axis.py frontend install

      - name: API types in sync with openapi.json
        run: python scripts/axis.py frontend gen-api-types --check

      - name: Approved UI baseline in sync
        run: python scripts/axis.py check ui-baseline

      - name: Type check and lint (zero errors, zero warnings)
        run: python scripts/axis.py frontend ci

      - name: Test
        run: python scripts/axis.py frontend test

  doc-drift:
    name: Doc drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc

      - name: Run shared policy profile
        run: python scripts/axis.py ready-review --policy-only
        env:
          BASE_BRANCH: main

  link-check:
    name: Markdown link check
    needs: detect
    if: needs.detect.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Lychee runs in offline mode (configured in lychee.toml): resolves
      # local file paths and #anchors only. External http(s) is intentionally
      # not blocking — third-party rot is real but doesn't belong in PR CI.
      # Version owner: docs/playbooks/scripts.md#tool-versions.
      - name: Lychee — verify internal links and anchors
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          lycheeVersion: v0.23.0
          args: --config ./lychee.toml './**/*.md'
          fail: true

  # Secret scanning via TruffleHog. Free, open-source, no license required
  # for any account type (gitleaks-action v2 broke this — its breaking
  # update added a paid GITLEAKS_LICENSE requirement for repository and personal
  # accounts alike, see https://github.com/gitleaks/gitleaks-action#-announcement).
  #
  # `--only-verified` cuts down false positives by querying the alleged
  # service for token validity before reporting. Scans the full diff
  # between PR base and HEAD (fetch-depth: 0 needed for that comparison).
  # NOTE: keep the job `name:` tool-agnostic ("Secret scanning"). The
  # required-check setting in branch protection references this exact
  # string — if we ever swap TruffleHog for another scanner (as we just
  # did Gitleaks → TruffleHog), changing the name would silently disable
  # the requirement until the protection rule is updated. The tool name
  # belongs in the step `name:` and surrounding comments.
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
