name: CI Build and Test

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET — Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-dotnet's built-in cache hashes every csproj + packages.lock.json
      # (when present) and restores ~/.nuget/packages keyed on the hash.
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Verify Docker is available (required by Testcontainers)
        run: docker info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # Format gate — see CLAUDE.md § Gate 1. Runs after build so analyzer
      # diagnostics are populated. Fails the job on any whitespace / charset
      # / style violation the local `dotnet format` would also catch.
      - name: Verify formatting (dotnet format)
        run: dotnet format Axis.sln --verify-no-changes --no-restore

      - name: Test
        run: >
          dotnet test --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      # Upload TRX even on failure so PR annotations + post-mortem work.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx
          retention-days: 14

  frontend:
    name: Frontend — Type Check, Lint, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and lint (zero errors, zero warnings)
        run: npm run ci

      - name: Test
        run: npm run test

  doc-drift:
    name: Doc drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check doc drift
        run: ./scripts/check-doc-drift.sh
        env:
          BASE_BRANCH: main

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Lychee runs in offline mode (configured in lychee.toml): resolves
      # local file paths and #anchors only. External http(s) is intentionally
      # not blocking — third-party rot is real but doesn't belong in PR CI.
      - name: Lychee — verify internal links and anchors
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config ./lychee.toml './**/*.md'
          fail: true

  # GitHub-native check against the GitHub Advisory Database. Fails the PR
  # when a newly added or version-bumped dependency carries a known
  # vulnerability. Zero cost; runs in <10s.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@67d4f4bd7a9b17a0db54d2a7519187c65e339de8 # v4.8.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
