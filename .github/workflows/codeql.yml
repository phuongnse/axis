name: CodeQL

# GitHub-native SAST. Catches a class of bugs that build/test miss:
# SQL injection, unsafe deserialisation, XSS, path traversal, hardcoded
# secrets, weak crypto. Free for public repos and for private repos via
# GitHub Advanced Security.
#
# Runs on every PR (against the code being merged) and weekly on main
# (to catch new advisory rules against existing code).

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.cs'
      - '**.csproj'
      - 'frontend/**.ts'
      - 'frontend/**.tsx'
      - 'frontend/**.js'
      - 'frontend/**.jsx'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'Directory.Packages.props'
      - '.github/workflows/codeql.yml'
  schedule:
    # Weekly Monday 02:00 UTC (09:00 ICT). Catches advisory updates against
    # the latest main without waiting for the next PR.
    - cron: '0 2 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # required for CodeQL to upload results
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@31cffa6090e1c5d92ef5a73f6c4e7c4ba17a8c2d # v4.31.6
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@31cffa6090e1c5d92ef5a73f6c4e7c4ba17a8c2d # v4.31.6
        with:
          category: "/language:${{ matrix.language }}"
