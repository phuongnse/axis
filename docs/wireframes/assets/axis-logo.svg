<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 36" fill="none" role="img" aria-label="Axis">
  <title>Axis</title>
  <defs>
    <linearGradient id="axis-bg" x1="4" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF0EE"/>
      <stop offset="1" stop-color="#F6EEE4"/>
    </linearGradient>
    <linearGradient id="axis-word" x1="44" y1="8" x2="120" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F5F57"/>
      <stop offset="0.55" stop-color="#667A6E"/>
