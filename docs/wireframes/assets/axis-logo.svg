  <circle cx="25.5" cy="24.5" r="5.25" fill="#5B9EC9" stroke="#3D6F8C" stroke-width="1.25"/>
  <circle cx="18" cy="10.5" r="1.75" fill="#FFFDF9"/>
  <circle cx="10.5" cy="24.5" r="1.75" fill="#F4F3EF"/>
  <circle cx="25.5" cy="24.5" r="1.75" fill="#F0F6FA"/>
  <!-- Wordmark -->
  <text x="44" y="24" fill="url(#axis-word)" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="19" font-weight="700" letter-spacing="-0.03em">Axis</text>
