services:
  postgres:
    image: postgres:16-alpine
    container_name: axis_postgres
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis_dev_pass
      POSTGRES_DB: axis
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis -d axis"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: axis_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  maildev:
    image: maildev/maildev:2.1.0
    container_name: axis_maildev
    ports:
      - "127.0.0.1:1025:1025"  # SMTP
      - "127.0.0.1:1080:1080"  # Web UI — open http://localhost:1080 to read outbound mail
    healthcheck:
      disable: true

  # Optional local observability stack (ADR-018). Start with:
  #   docker compose --profile observability up -d
  otel-lgtm:
    profiles: ["observability"]
    image: grafana/otel-lgtm:0.11.8
    container_name: axis_otel_lgtm
    ports:
      - "127.0.0.1:3001:3000" # Grafana UI — http://localhost:3001
      - "127.0.0.1:4318:4318" # OTLP/HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: axis_api
    working_dir: /src
    command:
      - dotnet
      - watch
      - --project
      - src/Axis.Api/Axis.Api.csproj
      - --no-hot-reload
      - run
      - --no-launch-profile
      - --artifacts-path
      - /tmp/axis-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      maildev:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:8443
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      Kestrel__Certificates__Default__Path: "/https/localhost.pem"
      Kestrel__Certificates__Default__KeyPath: "/https/localhost-key.pem"
      ConnectionStrings__Identity: "Host=postgres;Port=5432;Database=axis_identity;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__BusinessObjects: "Host=postgres;Port=5432;Database=axis_business_objects;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__Rules: "Host=postgres;Port=5432;Database=axis_rules;Username=axis;Password=axis_dev_pass"
      Redis__ConnectionString: "redis:6379"
      App__BaseUrl: "${APP_BASE_URL:-https://localhost:3000}"
      Email__Host: maildev
      Email__Port: "1025"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS:-noreply@axis.localhost}"
      Email__FromName: "${EMAIL_FROM_NAME:-Axis Platform}"
      Cors__AllowedOrigins__0: "https://localhost:3000"
      RateLimiting__Auth__PermitLimit: "1000"
      # OTLP export is off in the default compose API container (no LGTM dependency).
      # For traces in Grafana: `docker compose --profile observability up -d otel-lgtm`
      # then `dotnet run` on the host (appsettings.json → localhost:4318) or set
      # OpenTelemetry__Otlp__Endpoint=http://otel-lgtm:4318 when running API in compose with the profile.
      OpenTelemetry__Otlp__Endpoint: ""
    ports:
      - "127.0.0.1:5281:8443"
    volumes:
      - ./src:/src/src
      - ./Axis.sln:/src/Axis.sln:ro
      - ./.editorconfig:/src/.editorconfig:ro
      - ./Directory.Build.props:/src/Directory.Build.props:ro
      - ./Directory.Packages.props:/src/Directory.Packages.props:ro
      - ./.dev-certs/rootCA.pem:/https/rootCA.pem:ro
      - ./.dev-certs/localhost.pem:/https/localhost.pem:ro
      - ./.dev-certs/localhost-key.pem:/https/localhost-key.pem:ro
      - nuget_packages:/root/.nuget/packages
    healthcheck:
      test: ["CMD-SHELL", "curl --cacert /https/rootCA.pem -fsS https://localhost:8443/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: axis_web
    depends_on:
      - api
    environment:
      NODE_EXTRA_CA_CERTS: "/https/rootCA.pem"
      VITE_API_PROXY_TARGET: "https://api:8443"
      VITE_ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      VITE_DEV_HTTPS_CERT: "/https/localhost.pem"
      VITE_DEV_HTTPS_KEY: "/https/localhost-key.pem"
      VITE_USE_POLLING: "${VITE_USE_POLLING:-}"
    command: ["sh", "./scripts/docker-dev-entrypoint.sh"]
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./frontend:/app
      - ./.dev-certs/rootCA.pem:/https/rootCA.pem:ro
      - ./.dev-certs/localhost.pem:/https/localhost.pem:ro
      - ./.dev-certs/localhost-key.pem:/https/localhost-key.pem:ro
      - web_node_modules:/app/node_modules

  e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: axis_e2e
    working_dir: /work/frontend
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      maildev:
        condition: service_started
    environment:
      CI: "1"
      NODE_EXTRA_CA_CERTS: "/https/rootCA.pem"
      E2E_BASE_URL: "https://web:3000"
      E2E_API_URL: "https://api:8443"
      E2E_MAILDEV_URL: "http://maildev:1080"
      E2E_VERIFY_ORIGIN: "${APP_BASE_URL:-https://localhost:3000}"
      E2E_SKIP_WEB_SERVER: "1"
      E2E_OUTPUT_DIR: "/tmp/axis-e2e/test-results"
      E2E_REPORT_DIR: "/tmp/axis-e2e/playwright-report"
      HOME: "/home/pwuser"
      PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    entrypoint: ["sh", "./scripts/docker-e2e-entrypoint.sh"]
    volumes:
      - ./.dev-certs/rootCA.pem:/https/rootCA.pem:ro

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  nuget_packages:
