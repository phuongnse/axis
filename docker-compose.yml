services:
  postgres:
    image: postgres:16-alpine
    container_name: axis_postgres
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis_dev_pass
      POSTGRES_DB: axis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis -d axis"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: axis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  maildev:
    image: maildev/maildev:2.1.0
    container_name: axis_maildev
    ports:
      - "1025:1025"  # SMTP
      - "1080:1080"  # Web UI — open http://localhost:1080 to read outbound mail
    healthcheck:
      disable: true

  localstack:
    image: localstack/localstack:3.8
    container_name: axis_localstack
    environment:
      SERVICES: s3
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Distributed-ready foundation (ADR-013, ADR-019, ADR-022) ─────────
  # Kafka + Schema Registry are the cross-module event transport
  # (configured in Axis.Api as the Wolverine transport per ADR-013).
  # Vault is the secrets store for production (dev uses .env).
  # All three are mandatory like postgres/redis — the api service waits
  # for kafka:healthy before starting.

  kafka:
    # Confluent CP image (Community License — free for single-broker dev
    # and production). Pairs with cp-schema-registry below. KRaft mode is
    # the current Confluent default (no ZooKeeper).
    image: confluentinc/cp-kafka:7.7.0
    container_name: axis_kafka
    environment:
      # Single-broker KRaft cluster — broker + controller in one process.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      # Two advertised listeners: internal (PLAINTEXT for other containers
      # on the compose network) and host (PLAINTEXT_HOST for processes
      # running on the developer's machine).
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Single broker → replication 1 for all internal topics.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Fixed cluster ID so KRaft metadata survives container recreate
      # (must be 22-char Base64-URL). Generated once with `kafka-storage random-uuid`.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      # Only the host listener is published. The in-network listener
      # (PLAINTEXT on :9092) stays reachable inside the Compose network as
      # `kafka:9092` and is intentionally not exposed — its advertised
      # address would mis-resolve from the host.
      - "29092:29092"    # host PLAINTEXT — connect from local processes here
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: axis_schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: "schema-registry"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:9092"
      # Backward-compatible-only is the safest default; producers cannot
      # ship a breaking schema change without explicit override.
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  vault:
    # Dev mode — secrets live in memory only (lost on restart). Acceptable
    # for local development; production uses a separately-provisioned
    # Vault cluster with persistent storage + unseal keys (ADR-022).
    image: hashicorp/vault:1.18
    container_name: axis_vault
    cap_add: [IPC_LOCK]    # required by Vault to prevent secrets being swapped to disk
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "axis-dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8200/v1/sys/health | grep -q '\"initialized\":true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: axis_api
    working_dir: /src
    command:
      - bash
      - -lc
      - "dotnet restore src/Axis.Api/Axis.Api.csproj && dotnet watch --project src/Axis.Api/Axis.Api.csproj --non-interactive run --no-launch-profile"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      maildev:
        condition: service_started
      localstack:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Required for `dotnet watch` to detect file changes on a bind-mounted
      # Windows filesystem (WSL2). inotify events do not propagate reliably.
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
      ConnectionStrings__Identity: "Host=postgres;Port=5432;Database=axis;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__DataModeling: "Host=postgres;Port=5432;Database=axis;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__WorkflowBuilder: "Host=postgres;Port=5432;Database=axis;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__FormBuilder: "Host=postgres;Port=5432;Database=axis;Username=axis;Password=axis_dev_pass"
      ConnectionStrings__WorkflowEngine: "Host=postgres;Port=5432;Database=axis;Username=axis;Password=axis_dev_pass"
      Redis__ConnectionString: "redis:6379"
      Kafka__Brokers: "kafka:9092"
      Email__Host: maildev
      Email__Port: "1025"
      Aws__ServiceURL: "http://localstack:4566"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "5280:8080"
    volumes:
      - ./src:/src/src
      - ./Axis.sln:/src/Axis.sln:ro
      - ./Directory.Build.props:/src/Directory.Build.props:ro
      - ./Directory.Packages.props:/src/Directory.Packages.props:ro
      - nuget_packages:/root/.nuget/packages
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: axis_web
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: "http://api:8080"
      # Vite chokidar polling — needed for file change events through WSL bind mounts.
      VITE_USE_POLLING: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  web_node_modules:
  nuget_packages:
  kafka_data:
